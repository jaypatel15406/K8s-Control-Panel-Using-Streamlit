# Test Deployment for K8s Control Panel Testing
# Purpose: Provide a sample deployment for testing scale up/down operations
# Namespace: k8s-control-panel-test

apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-nginx-deployment
  namespace: k8s-control-panel-test
  labels:
    app: nginx
    environment: test
spec:
  replicas: 2  # Initial replica count - test scaling from this baseline
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        environment: test
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15

---
# Additional test deployment with different app
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-busybox-deployment
  namespace: k8s-control-panel-test
  labels:
    app: busybox
    environment: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: busybox
  template:
    metadata:
      labels:
        app: busybox
        environment: test
    spec:
      containers:
      - name: busybox
        image: busybox:1.36
        command: ["sleep", "3600"]
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
